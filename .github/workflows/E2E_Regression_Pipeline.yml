name: E2E_Regression

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  TARGET: "%regex[.*Tests.*],com.automationexercices.tests.**,**,com.automationexercices.tests.**"

jobs:
    Edge_Linux:
      runs-on: ubuntu-latest
      permissions:
        checks: write
      steps:
        - name: checkout Code
          uses: actions/checkout@v6

        - name: setup java
          uses: actions/setup-java@v4
          with:
            distribution: 'zulu'
            java-version: '21'

        - name: setup maven
          uses: stCarolas/setup-maven@v5
          with:
            maven-version: 3.9.12

        - name: Running Tests
          continue-on-error: true
          run: mvn -Dtest="${TARGET}" -DexecutionType="LocalHeadless" -DbrowserType="Chrome" clean test


        - name: Upload Test Results
          uses: actions/upload-artifact@v7
          with:
                name: Edge_Linux_Report
                path: "test-outputs/reports/*.html"

